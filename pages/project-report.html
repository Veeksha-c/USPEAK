<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Project Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e63946;
      --green: #22c55e;
      --blue: #3b82f6;
      --text: #ffffff;
      --muted: #555555;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }
    .page-wrap { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; min-height: 100vh; padding: 2rem 1.5rem 3rem; display: flex; flex-direction: column; }

    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .logo .u { color: var(--accent); }

    .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 2.8rem); letter-spacing: -0.03em; margin: 2rem 0 0.3rem; opacity: 0; animation: riseIn 0.5s ease 0.1s forwards; }
    .page-subtitle { font-size: 0.85rem; color: var(--muted); font-weight: 300; margin-bottom: 2rem; opacity: 0; animation: riseIn 0.5s ease 0.2s forwards; }

    /* Tip card */
    .tip-card {
      background: rgba(230,57,70,0.05); border: 1px solid rgba(230,57,70,0.15);
      border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1.25rem;
      display: flex; gap: 0.75rem; align-items: flex-start;
      opacity: 0; animation: riseIn 0.5s ease 0.25s forwards;
    }
    .tip-icon { font-size: 0.9rem; margin-top: 1px; flex-shrink: 0; }
    .tip-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
    .tip-text { font-size: 0.85rem; color: #bbb; line-height: 1.5; font-weight: 300; }

    /* Section tabs */
    .tab-row {
      display: flex; gap: 0.5rem; margin-bottom: 1.25rem;
      opacity: 0; animation: riseIn 0.5s ease 0.28s forwards;
    }
    .tab-btn {
      flex: 1; padding: 0.6rem 0.5rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      text-align: center;
    }
    .tab-btn.active {
      background: rgba(230,57,70,0.08); border-color: rgba(230,57,70,0.25);
      color: var(--accent);
    }

    /* Section cards */
    .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; opacity: 0; }
    .section-card.s1 { animation: riseIn 0.5s ease 0.3s forwards; }
    .section-card.s2 { animation: riseIn 0.5s ease 0.38s forwards; }
    .section-card.s3 { animation: riseIn 0.5s ease 0.46s forwards; }

    .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.25rem; }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-dot.green { background: var(--green); }
    .section-dot.red   { background: var(--accent); }
    .section-dot.blue  { background: var(--blue); }
    .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    .feedback-item { display: flex; gap: 0.75rem; align-items: flex-start; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .feedback-item:last-child { border-bottom: none; padding-bottom: 0; }
    .feedback-item:first-child { padding-top: 0; }
    .feedback-bullet { width: 5px; height: 5px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }
    .feedback-bullet.green { background: var(--green); }
    .feedback-bullet.red   { background: var(--accent); }
    .feedback-text { font-size: 0.875rem; color: #ccc; line-height: 1.55; font-weight: 400; }

    /* Q&A breakdown items */
    .qa-item {
      padding: 1rem 0; border-bottom: 1px solid var(--border);
    }
    .qa-item:last-child { border-bottom: none; padding-bottom: 0; }
    .qa-item:first-child { padding-top: 0; }
    .qa-question { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; font-style: italic; }
    .qa-feedback { font-size: 0.85rem; color: #ccc; line-height: 1.5; }
    .qa-skipped  { font-size: 0.78rem; color: #333; font-style: italic; }

    /* Panel toggle */
    .panel { display: none; }
    .panel.active { display: block; }

    .btn-primary {
      width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 12px;
      color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s; margin-top: 1rem;
      opacity: 0; animation: riseIn 0.5s ease 0.55s forwards;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    @keyframes riseIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="logo"><span class="u">U</span><span style="color:#fff">SPEAK</span></div>

    <h1 class="page-title">Project Report.</h1>
    <p class="page-subtitle">Full feedback on your explanation and Q&A</p>

    <!-- COACH TIP -->
    <div class="tip-card" id="tipCard" style="display:none;">
      <div class="tip-icon">💡</div>
      <div>
        <div class="tip-label">Coach's Tip</div>
        <p class="tip-text" id="tipText"></p>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('explanation', this)">Explanation</button>
      <button class="tab-btn"        onclick="switchTab('qa', this)">Q&amp;A Round</button>
    </div>

    <!-- EXPLANATION PANEL -->
    <div class="panel active" id="panel-explanation">
      <div class="section-card s1">
        <div class="section-header">
          <div class="section-dot green"></div>
          <span class="section-title">What you did well</span>
        </div>
        <div id="prosList"></div>
      </div>
      <div class="section-card s2">
        <div class="section-header">
          <div class="section-dot red"></div>
          <span class="section-title">Areas to improve</span>
        </div>
        <div id="consList"></div>
      </div>
    </div>

    <!-- Q&A PANEL -->
    <div class="panel" id="panel-qa">
      <div class="section-card s3">
        <div class="section-header">
          <div class="section-dot blue"></div>
          <span class="section-title">Q&amp;A Feedback</span>
        </div>
        <div id="qaList"></div>
      </div>
    </div>

    <button class="btn-primary" onclick="window.location.href='./project-stats.html'">
      View Scores →
    </button>
  </div>

  <script>
    const rawAnalysis = localStorage.getItem("projectAnalysis");
    if (!rawAnalysis) {
      alert("No analysis found. Please complete a session first.");
      window.location.href = "./vibe.html";
    }

    const analysis = JSON.parse(rawAnalysis);

    // Tip
    if (analysis.improvement_tip) {
      document.getElementById("tipText").textContent = analysis.improvement_tip;
      document.getElementById("tipCard").style.display = "flex";
    }

    // Explanation pros
    const prosList = document.getElementById("prosList");
    (analysis.explanation_pros || analysis.pros || []).forEach(p => {
      const div = document.createElement("div");
      div.className = "feedback-item";
      div.innerHTML = `<div class="feedback-bullet green"></div><p class="feedback-text">${p}</p>`;
      prosList.appendChild(div);
    });

    // Explanation cons
    const consList = document.getElementById("consList");
    (analysis.explanation_cons || analysis.cons || []).forEach(c => {
      const div = document.createElement("div");
      div.className = "feedback-item";
      div.innerHTML = `<div class="feedback-bullet red"></div><p class="feedback-text">${c}</p>`;
      consList.appendChild(div);
    });

    // Q&A feedback
    const qaList = document.getElementById("qaList");
    const qaFeedback = analysis.qa_feedback || [];
    if (qaFeedback.length === 0) {
      qaList.innerHTML = `<p style="font-size:0.85rem; color:#444;">No Q&A feedback available.</p>`;
    } else {
      qaFeedback.forEach(item => {
        const div = document.createElement("div");
        div.className = "qa-item";
        if (item.skipped) {
          div.innerHTML = `
            <p class="qa-question">"${item.question}"</p>
            <p class="qa-skipped">— Skipped</p>`;
        } else {
          div.innerHTML = `
            <p class="qa-question">"${item.question}"</p>
            <p class="qa-feedback">${item.feedback}</p>`;
        }
        qaList.appendChild(div);
      });
    }

    // Tab switching
    function switchTab(name, btn) {
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("panel-" + name).classList.add("active");
      btn.classList.add("active");
    }
  </script>
</body>
</html>
