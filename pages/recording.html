<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Recording</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-black text-white">
  <!-- PHONE CONTAINER -->
  <div class="w-[390px] h-[844px] flex flex-col justify-between px-5 py-6">
  <div class="mb-4 bg-[#1a1f22] rounded-xl px-4 py-3 text-sm">
  <p class="opacity-70 mb-1">Your topic</p>
  <p id="recordTopic" class="font-semibold"></p>
</div>
    <!-- VIDEO PREVIEW -->
    <div class="flex-1 rounded-3xl overflow-hidden bg-black relative">
      <video id="video"
        autoplay
        muted
        playsinline
        class="w-full h-full object-cover"
      ></video>
<!-- RECORDING STATUS -->
<div id="recordingStatus" class="hidden absolute top-4 left-4 right-4 flex items-center justify-between text-sm">

        <div class="flex items-center gap-2">

          <span class="w-3 h-3 rounded-full bg-red-600 animate-pulse"></span>

          <span>Recording</span>

        </div>

        <span id="timer">00:00</span>

      </div>

    </div>



    <!-- ACTIONS -->

    <div class="mt-6">

      <!-- RECORD BUTTON -->

      <button

        id="recordBtn"

        class="w-full bg-[#1a1f22] py-4 rounded-full text-red-600 font-semibold tracking-wide"

      >

        TAP IN

      </button>



      <!-- NEXT BUTTON -->

      <button

        id="nextBtn"

        class="hidden w-full mt-4 bg-[#1a1f22] py-3 rounded-full text-white"

      >

        NEXT →

      </button>

    </div>



  </div>



  <!-- SCRIPT -->

  <script>
  const video = document.getElementById("video");
  const recordBtn = document.getElementById("recordBtn");
  const nextBtn = document.getElementById("nextBtn");
  const recordingStatus = document.getElementById("recordingStatus");
  const timerEl = document.getElementById("timer");

  const topic = localStorage.getItem("generatedTopic");
  if (topic) {
    document.getElementById("recordTopic").innerText = topic;
  }

  let mediaRecorder;
  let recordedChunks = [];
  let isRecording = false;
  let stream;
  let timerInterval;
  let seconds = 0;

  // 🎥 Start camera preview
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
      });
      video.srcObject = stream;
    } catch (err) {
      alert("Camera or microphone access denied");
    }
  }

  startCamera();

  // 🎙 Record button
  recordBtn.addEventListener("click", () => {
    if (!isRecording) {
      startRecording();
    } else {
      stopRecording();
    }
  });

  function startRecording() {
    // Clear previous data
    localStorage.removeItem("analysis");
    localStorage.removeItem("transcript");

    recordedChunks = [];
    seconds = 0;
    timerEl.textContent = "00:00";

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };

    // 🔥 Attach onstop BEFORE stopping
    mediaRecorder.onstop = handleRecordingStop;

    mediaRecorder.start();
    isRecording = true;

    // UI updates
    recordBtn.textContent = "STOP";
    recordBtn.classList.add("bg-red-600", "text-white");
    recordingStatus.classList.remove("hidden");
    nextBtn.classList.add("hidden");

    // ⏱ Timer + auto-stop
    const sessionLength = parseInt(localStorage.getItem("sessionLength") || "2");
    const maxSeconds = sessionLength * 60;

    timerInterval = setInterval(() => {
      seconds++;

      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;

      if (seconds >= maxSeconds) {
        stopRecording();
      }
    }, 1000);
  }

  function stopRecording() {
    // 🛑 Guard against double stop
    if (!isRecording) return;

    isRecording = false;
    clearInterval(timerInterval);

    mediaRecorder.stop();

    // UI updates
    recordBtn.textContent = "TAP IN";
    recordBtn.classList.remove("bg-red-600", "text-white");
    recordingStatus.classList.add("hidden");
  }

  // 📤 Upload + analyze after stop
  async function handleRecordingStop() {
    const blob = new Blob(recordedChunks, { type: "video/webm" });

    const formData = new FormData();
    formData.append("file", blob, "recording.webm");

    // 🔹 Transcribe
    const res = await fetch("http://127.0.0.1:8000/transcribe", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    localStorage.setItem("transcript", data.transcript);

    // 🔹 Analyze
    const analysisRes = await fetch("http://127.0.0.1:8000/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ transcript: data.transcript })
    });
    const analysis = await analysisRes.json();
    localStorage.setItem("analysis", JSON.stringify(analysis));

    // 🔹 Save session for graph & streak
    const sessions = JSON.parse(localStorage.getItem("sessions")) || [];
    const scores = analysis.scores;

    const avgScore = (
      scores.fluency +
      scores.clarity +
      scores.confidence +
      scores.on_topic +
      scores.body_language+
      (10 - scores.filler_words)
    ) / 6;

    sessions.push({
      date: new Date().toISOString().split("T")[0],
      avgScore: Math.round(avgScore * 10) / 10
    });

    localStorage.setItem("sessions", JSON.stringify(sessions.slice(-10)));

    // 🔥 Show NEXT only after everything completes
    nextBtn.classList.remove("hidden");
  }

  // ➡️ Go to report page
  nextBtn.addEventListener("click", () => {
    window.location.href = "./report.html";
  });
</script>
  </body>
</html>
