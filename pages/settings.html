<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e63946;
      --text: #ffffff;
      --muted: #555555;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .logo .u { color: var(--accent); }

    .close-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      text-decoration: none;
      font-size: 0.75rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .close-btn:hover { border-color: #333; color: #888; }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.03em;
      margin: 2rem 0 0.4rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.1s forwards;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.2s forwards;
    }

    .field-group { margin-bottom: 1.5rem; }

    .field-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.6rem;
      display: block;
    }

    .field-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #333; }
    .field-input::placeholder { color: #333; }

    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.3); cursor: pointer;
    }

    .length-options { display: flex; gap: 0.6rem; }
    .length-option { flex: 1; cursor: pointer; }
    .length-option input[type="radio"] { display: none; }

    .length-pill {
      display: block;
      text-align: center;
      padding: 0.75rem 0.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .length-option input:checked + .length-pill {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(230,57,70,0.06);
    }
    .length-pill:hover { border-color: #333; color: #888; }

    /* Toggle switch for active/inactive */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .toggle-label { font-size: 0.875rem; color: #aaa; }
    .toggle {
      position: relative;
      width: 42px; height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2a2a2a;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: rgba(230,57,70,0.2); }
    .toggle input:checked + .slider:before {
      transform: translateX(18px);
      background: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .btn-row { display: flex; gap: 0.75rem; }

    .btn-secondary {
      flex: 1;
      padding: 0.875rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #333; color: #888; }

    .btn-primary {
      flex: 2;
      padding: 0.875rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.8rem;
      color: #ccc;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .status-active {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
    }
    .status-inactive {
      background: rgba(100,100,100,0.1);
      color: #555;
      border: 1px solid #222;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <!-- HEADER -->
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div class="logo"><span class="u">U</span><span style="color:#fff">SPEAK</span></div>
      <a href="./vibe.html" class="close-btn">
        <i class="fa-solid fa-xmark"></i>
      </a>
    </div>

    <!-- TITLE -->
    <h1 class="page-title">Settings.</h1>
    <p class="page-subtitle">Customize your practice experience</p>

    <!-- REMINDER STATUS (shown if reminder exists) -->
    <div id="reminderStatus" style="display:none; margin-bottom:1.5rem;">
      <div style="display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; background:#0f0f0f; border:1px solid #1a1a1a; border-radius:10px;">
        <span style="font-size:0.8rem; color:#555;">Reminder status</span>
        <span id="statusBadge" class="status-badge status-active">
          <i class="fa-solid fa-circle" style="font-size:0.45rem;"></i> Active
        </span>
      </div>
    </div>

    <!-- EMAIL -->
    <div class="field-group">
      <label class="field-label">Reminder Email</label>
      <input id="emailInput" type="email" placeholder="you@gmail.com" class="field-input" />
    </div>

    <!-- TIME -->
    <div class="field-group">
      <label class="field-label">Daily Reminder Time</label>
      <input id="timeInput" type="time" class="field-input" />
    </div>

    <!-- SESSION LENGTH -->
    <div class="field-group">
      <label class="field-label">Session Length</label>
      <div class="length-options">
        <label class="length-option">
          <input type="radio" name="length" value="2" />
          <span class="length-pill">2 min</span>
        </label>
        <label class="length-option">
          <input type="radio" name="length" value="5" />
          <span class="length-pill">5 min</span>
        </label>
        <label class="length-option">
          <input type="radio" name="length" value="10" />
          <span class="length-pill">10 min</span>
        </label>
      </div>
    </div>

    <!-- ACTIVE TOGGLE -->
    <div class="field-group">
      <label class="field-label">Reminder On/Off</label>
      <div class="toggle-row">
        <span class="toggle-label">Send me daily reminders</span>
        <label class="toggle">
          <input type="checkbox" id="activeToggle" checked />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <hr class="divider" />

    <!-- BUTTONS -->
    <div class="btn-row">
      <a href="./vibe.html" class="btn-secondary">Cancel</a>
      <button id="saveBtn" class="btn-primary">
        Save Settings
        <i class="fa-solid fa-check" style="font-size:0.75rem;"></i>
      </button>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = "https://uspeak-backend.onrender.com";
    let currentReminderId = null;   // stores existing reminder _id if found

    // ── HELPERS ───────────────────────────────────────────

    function getToken() {
      return localStorage.getItem("token");
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${getToken()}`
      };
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function applyReminderToUI(reminder) {
      if (!reminder) return;

      currentReminderId = reminder.id;

      document.getElementById("emailInput").value = reminder.email || "";
      // Convert UTC back to IST for display (UTC + 5:30)
if (reminder.time) {
  const [h, m] = reminder.time.split(":").map(Number);
  const totalMins = h * 60 + m + 330;
  const istMins = totalMins % 1440;
  const istH = Math.floor(istMins / 60);
  const istM = istMins % 60;
  document.getElementById("timeInput").value = 
    `${String(istH).padStart(2,"0")}:${String(istM).padStart(2,"0")}`;
}
      document.getElementById("activeToggle").checked = reminder.is_active !== false;

      const len = String(reminder.session_length || 2);
      const radio = document.querySelector(`input[name="length"][value="${len}"]`);
      if (radio) radio.checked = true;

      // Show status badge
      const statusDiv = document.getElementById("reminderStatus");
      statusDiv.style.display = "block";

      const badge = document.getElementById("statusBadge");
      if (reminder.is_active) {
        badge.className = "status-badge status-active";
        badge.innerHTML = `<i class="fa-solid fa-circle" style="font-size:0.45rem;"></i> Active`;
      } else {
        badge.className = "status-badge status-inactive";
        badge.innerHTML = `<i class="fa-solid fa-circle" style="font-size:0.45rem;"></i> Paused`;
      }
    }

    // ── LOAD EXISTING SETTINGS ON PAGE LOAD ───────────────

    async function loadSettings() {
      const token = getToken();
      if (!token) return;  // not logged in, show empty form

      try {
        const res = await fetch(`${API}/reminders/`, {
          headers: authHeaders()
        });

        if (!res.ok) return;

        const data = await res.json();
        if (data.reminder) {
          applyReminderToUI(data.reminder);
          localStorage.setItem("sessionLength", String(data.reminder.session_length || 2));
        }
      } catch (err) {
        console.warn("Could not load reminder settings:", err);
      }
    }

    // ── SAVE ──────────────────────────────────────────────

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const email       = document.getElementById("emailInput").value.trim();
const localTime   = document.getElementById("timeInput").value; // user enters IST

// Convert IST → UTC (IST = UTC + 5:30, so UTC = IST - 5:30)
const [hours, minutes] = localTime.split(":").map(Number);
const totalMinutes = hours * 60 + minutes - 330;
const utcMinutes = ((totalMinutes % 1440) + 1440) % 1440;
const utcHours = Math.floor(utcMinutes / 60);
const utcMins = utcMinutes % 60;
const time = `${String(utcHours).padStart(2,"0")}:${String(utcMins).padStart(2,"0")}`;
      
      const lengthInput = document.querySelector('input[name="length"]:checked');
      const isActive    = document.getElementById("activeToggle").checked;

      if (!email || !time || !lengthInput) {
        showToast("⚠ Please fill all fields");
        return;
      }

      const token = getToken();
      if (!token) {
        showToast("⚠ Please log in first");
        return;
      }

      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;
      saveBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin" style="font-size:0.75rem;"></i> Saving...`;

      try {
        const res = await fetch(`${API}/reminders/`, {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({
            email,
            time,
            session_length: parseInt(lengthInput.value),
            repeat: "daily",
            is_active: isActive
          })
        });

        if (!res.ok) {
          const err = await res.json();
          showToast(`❌ ${err.detail || "Failed to save"}`);
          return;
        }

        const data = await res.json();
        applyReminderToUI(data.reminder);
        localStorage.setItem("sessionLength", lengthInput.value);

        showToast("✓ Settings saved to your account");

      } catch (err) {
        showToast("❌ Network error — check if backend is running");
        console.error(err);
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = `Save Settings <i class="fa-solid fa-check" style="font-size:0.75rem;"></i>`;
      }
    });

    // ── INIT ──────────────────────────────────────────────
    window.addEventListener("load", loadSettings);
  </script>
</body>
</html>
