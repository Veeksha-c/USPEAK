<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Settings</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome (for consistency with vibe page) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>

<body class="min-h-screen flex items-center justify-center bg-black text-white">

  <!-- PHONE CONTAINER -->
  <div class="w-[390px] h-[844px] px-6 py-6">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-10">
      <div class="text-xl font-bold tracking-wide">
        <span class="text-red-600">U</span><span class="text-[#161A1D]">SPEAK</span>
      </div>

      <!-- BACK / CLOSE -->
      <a href="./vibe.html" class="text-lg opacity-70 hover:opacity-100">
        ✕
      </a>
    </div>

    <!-- TITLE -->
    <h1 class="text-2xl font-medium mb-8">
      Settings
    </h1>

    <!-- FORM -->
    <div class="space-y-6">

      <!-- EMAIL -->
      <div>
        <label class="block text-sm opacity-70 mb-2">Gmail</label>
        <input
  id="emailInput"
  type="email"
  placeholder="you@gmail.com"
  class="w-full bg-[#0f1113] rounded-xl px-4 py-3 outline-none"
/>

      </div>

      <!-- SCHEDULE -->
      <!-- SCHEDULE -->
<div>
  <label class="block text-sm opacity-70 mb-2">Schedule Time</label>
  <input
  id="timeInput"
  type="time"
  class="w-full bg-[#0f1113] rounded-xl px-4 py-3 outline-none"
/>

</div>


      <!-- LENGTH -->
      <!-- SESSION LENGTH -->
<div>
  <label class="block text-sm opacity-70 mb-3">Session Length</label>

  <div class="flex gap-4">
    <label class="flex-1 cursor-pointer">
      <input type="radio" name="length" value="2" class="hidden peer" />
      <div class="text-center py-3 rounded-xl bg-[#0f1113] peer-checked:bg-red-600">
        2 min
      </div>
    </label>

    <label class="flex-1 cursor-pointer">
      <input type="radio" name="length" value="5" class="hidden peer" />
      <div class="text-center py-3 rounded-xl bg-[#0f1113] peer-checked:bg-red-600">
        5 min
      </div>
    </label>

    <label class="flex-1 cursor-pointer">
      <input type="radio" name="length" value="10" class="hidden peer" />
      <div class="text-center py-3 rounded-xl bg-[#0f1113] peer-checked:bg-red-600">
        10 min
      </div>
    </label>
  </div>
</div>
<button
  id="saveSettings"
  type="button"
  class="w-full bg-[#1a1f22] py-3 rounded-xl text-[#660708] font-medium"
>
  Save
</button>



    <!-- CONTINUE BUTTON -->
    <div class="mt-12">
      <a
        href="./vibe.html"
        class="block w-full text-center bg-red-600 rounded-xl py-3 font-medium hover:bg-red-700"
      >
        Continue
      </a>
    </div>

  </div>

</body>
<script>
  // 🔹 Restore saved values on page load
  window.addEventListener("load", () => {
    const savedEmail = localStorage.getItem("email");
    const savedTime = localStorage.getItem("time");
    const savedLength = localStorage.getItem("sessionLength");

    if (savedEmail) document.getElementById("emailInput").value = savedEmail;
    if (savedTime) document.getElementById("timeInput").value = savedTime;

    if (savedLength) {
      const radio = document.querySelector(
        `input[name="length"][value="${savedLength}"]`
      );
      if (radio) radio.checked = true;
    }
  });

  document.getElementById("saveSettings").addEventListener("click", async () => {
    const email = document.getElementById("emailInput").value;
    const time = document.getElementById("timeInput").value;
    const lengthInput = document.querySelector('input[name="length"]:checked');

    if (!email || !time || !lengthInput) {
      alert("Please fill all fields");
      return;
    }

    const sessionLength = lengthInput.value;

    // 🔹 Save locally (for UX + recording)
    localStorage.setItem("email", email);
    localStorage.setItem("time", time);
    localStorage.setItem("sessionLength", sessionLength);

    // 🔹 Save to backend (for Gmail reminders)
    const res = await fetch("http://127.0.0.1:8000/save-settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, time })
    });

    const data = await res.json();

    if (data.status === "saved") {
      alert("Settings saved successfully 🎉");
    }
  });
</script>


</html>
