<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e63946;
      --text: #ffffff;
      --muted: #555555;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .logo .u { color: var(--accent); }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.03em;
      margin: 2rem 0 0.4rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.1s forwards;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.2s forwards;
    }

    /* Overall score banner */
    .overall-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.25s forwards;
    }

    .overall-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .overall-score {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .overall-score span {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* Score bar */
    .score-bar-track {
      flex: 1;
      height: 4px;
      background: #1a1a1a;
      border-radius: 999px;
      margin-left: 1.5rem;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      flex: 1;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
    }

    /* Staggered card animations */
    .stat-card:nth-child(1) { animation: riseIn 0.4s ease 0.3s forwards; }
    .stat-card:nth-child(2) { animation: riseIn 0.4s ease 0.35s forwards; }
    .stat-card:nth-child(3) { animation: riseIn 0.4s ease 0.4s forwards; }
    .stat-card:nth-child(4) { animation: riseIn 0.4s ease 0.45s forwards; }
    .stat-card:nth-child(5) { animation: riseIn 0.4s ease 0.5s forwards; }
    .stat-card:nth-child(6) { animation: riseIn 0.4s ease 0.55s forwards; }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-value.good  { color: #22c55e; }
    .stat-value.mid   { color: #f59e0b; }
    .stat-value.low   { color: var(--accent); }

    /* Mini progress bar per card */
    .mini-bar-track {
      height: 3px;
      background: #1a1a1a;
      border-radius: 999px;
      overflow: hidden;
    }

    .mini-bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mini-bar-fill.good  { background: #22c55e; }
    .mini-bar-fill.mid   { background: #f59e0b; }
    .mini-bar-fill.low   { background: var(--accent); }

    /* Coming soon badge */
    .coming-soon {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2a2a2a;
      background: #161616;
      border: 1px solid #1f1f1f;
      border-radius: 999px;
      padding: 2px 8px;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      opacity: 0;
      animation: riseIn 0.5s ease 0.6s forwards;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <!-- HEADER -->
    <div class="logo"><span class="u">U</span><span style="color:#fff">SPEAK</span></div>

    <!-- TITLE -->
    <h1 class="page-title">Your Scores.</h1>
    <p class="page-subtitle" id="sessionDate">Session results</p>

    <!-- OVERALL BANNER -->
    <div class="overall-banner">
      <div>
        <div class="overall-label">Overall Score</div>
        <div class="overall-score" id="overallScore">–<span>/10</span></div>
      </div>
      <div class="score-bar-track">
        <div class="score-bar-fill" id="overallBar"></div>
      </div>
    </div>

    <!-- STATS GRID -->
    <div class="stats-grid">

      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Fluency</span>
        </div>
        <div class="stat-value" id="fluency">–</div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" id="fluencyBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Clarity</span>
        </div>
        <div class="stat-value" id="clarity">–</div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" id="clarityBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Confidence</span>
        </div>
        <div class="stat-value" id="confidence">–</div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" id="confidenceBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">On Topic</span>
        </div>
        <div class="stat-value" id="topic">–</div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" id="topicBar"></div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-label">Filler Words</span>
        </div>
        <div class="stat-value" id="filler">–</div>
        <div class="mini-bar-track">
          <div class="mini-bar-fill" id="fillerBar"></div>
        </div>
      </div>

      <div class="stat-card">
  <div class="stat-header">
    <span class="stat-label">Body Language</span>
  </div>
  <div class="stat-value" id="bodyLanguage">–</div>
  <div class="mini-bar-track">
    <div class="mini-bar-fill" id="bodyBar"></div>
  </div>
</div>

    </div>

    <!-- BUTTON -->
    <button class="btn-primary" onclick="window.location.href='./receipts.html'">
      The Receipts →
    </button>

  </div>

  <script>
    const raw = localStorage.getItem("analysis");
    if (!raw) {
      window.location.href = "./vibe.html";
    }

    const analysis = JSON.parse(raw);
    const scores = analysis.scores;

    const overall = analysis.overall_score ||
      Math.round(((scores.fluency + scores.clarity + scores.confidence +
        scores.on_topic + scores.filler_words + (scores.body_language || 5)) / 6) * 10) / 10;

    document.getElementById("overallScore").innerHTML = `${overall}<span>/10</span>`;

    const today = new Date();
    document.getElementById("sessionDate").textContent =
      today.toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long" });

    function colorClass(val) {
      if (val >= 8) return "good";
      if (val >= 5) return "mid";
      return "low";
    }

    const fields = [
      { id: "fluency",      barId: "fluencyBar",      val: scores.fluency },
      { id: "clarity",      barId: "clarityBar",      val: scores.clarity },
      { id: "confidence",   barId: "confidenceBar",   val: scores.confidence },
      { id: "topic",        barId: "topicBar",        val: scores.on_topic },
      { id: "filler",       barId: "fillerBar",       val: scores.filler_words },
      { id: "bodyLanguage", barId: "bodyBar",         val: scores.body_language },
    ];

    fields.forEach(({ id, barId, val }) => {
      const el  = document.getElementById(id);
      const bar = document.getElementById(barId);
      const cls = colorClass(val);
      el.textContent = val ?? "–";
      el.classList.add(cls);
      bar.classList.add(cls);
      setTimeout(() => { bar.style.width = `${(val / 10) * 100}%`; }, 400);
    });

    setTimeout(() => {
      document.getElementById("overallBar").style.width = `${(overall / 10) * 100}%`;
    }, 300);

    // ── SAVE SESSION ── wrapped in async IIFE, this is the fix
    (async () => {
      const token = localStorage.getItem("token");
      if (!token) return;  // not logged in, skip silently
      try {
        const res = await fetch("https://uspeak-backend.onrender.com/sessions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            avgScore: overall,
            date: new Date().toISOString().split("T")[0],
            vibe: analysis.vibe || null,
            scores: scores   // send full scores object too
          })
        });
        if (!res.ok) console.warn("Session save failed:", res.status);
        else console.log("✅ Session saved to MongoDB");
      } catch (e) {
        console.warn("Session save error:", e);
      }
    })();
</script>
</body>
</html>
