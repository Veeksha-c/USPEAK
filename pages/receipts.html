<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – The Receipts</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e63946;
      --text: #ffffff;
      --muted: #555555;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
    }
    .logo .u { color: var(--accent); }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.03em;
      margin: 2rem 0 0.4rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.1s forwards;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.2s forwards;
    }

    .graph-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.25s forwards;
    }

    .graph-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .graph-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .graph-count {
      font-size: 0.7rem;
      color: var(--muted);
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 0;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 300;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
      height: 140px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .streak-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.35s forwards;
    }

    .streak-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .streak-count-badge {
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.15);
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 500;
    }

    .month-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .day-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .day-label {
      text-align: center;
      font-size: 0.6rem;
      color: #333;
      letter-spacing: 0.05em;
    }

    .streak-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .streak-box {
      aspect-ratio: 1;
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
    }

    .streak-box:hover { transform: scale(1.15); }

    .streak-box.attended {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(230,57,70,0.3);
    }

    .streak-box.missed {
      background: #1a1a1a;
      border: 1px solid #1f1f1f;
    }

    .streak-box.today {
      border: 1px solid rgba(230,57,70,0.5) !important;
    }

    .streak-box::after {
      content: attr(data-date);
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: #ccc;
      font-size: 9px;
      padding: 3px 6px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .streak-box:hover::after { opacity: 1; }

    /* Error banner */
    .error-banner {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.2);
      border-radius: 12px;
      padding: 1rem;
      color: #e63946;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      opacity: 0;
      animation: riseIn 0.5s ease 0.45s forwards;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="page-wrap">

    <div class="logo"><span class="u">U</span><span style="color:#fff">SPEAK</span></div>

    <h1 class="page-title">The Receipts.</h1>
    <p class="page-subtitle">Your progress over time</p>

    <!-- Error banner (shown if not logged in or fetch fails) -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- GRAPH -->
    <div class="graph-card">
      <div class="graph-header">
        <span class="graph-title">Progress Chart</span>
        <span class="graph-count" id="sessionCount">Loading...</span>
      </div>
      <!-- Skeleton shown while loading -->
      <div class="skeleton" id="graphSkeleton"></div>
      <div id="emptyGraph" class="empty-state" style="display:none;">
        No sessions yet — record your first one!
      </div>
      <canvas id="progressChart" height="140" style="display:none;"></canvas>
    </div>

    <!-- STREAK -->
    <div class="streak-card">
      <div class="streak-header">
        <span class="graph-title">Monthly Streak</span>
        <span class="streak-count-badge" id="streakBadge">— days</span>
      </div>
      <p class="month-label" id="monthLabel"></p>
      <div class="day-labels">
        <div class="day-label">S</div><div class="day-label">M</div>
        <div class="day-label">T</div><div class="day-label">W</div>
        <div class="day-label">T</div><div class="day-label">F</div>
        <div class="day-label">S</div>
      </div>
      <div class="streak-grid" id="streakGrid"></div>
    </div>

    <button class="btn-primary" onclick="window.location.href='./vibe.html'">
      Go Again →
    </button>

  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    // ── AUTH CHECK ────────────────────────────────────────
    const token = localStorage.getItem("token");
    if (!token) {
      // Not logged in — redirect to login
      window.location.href = "./login.html";
    }

    // ── FETCH SESSIONS FROM BACKEND ───────────────────────
    async function loadSessions() {
      try {
        const res = await fetch(`${API}/sessions`, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (res.status === 401) {
          // Token expired or invalid — clear and redirect
          localStorage.removeItem("token");
          localStorage.removeItem("user");
          window.location.href = "./login.html";
          return;
        }

        if (!res.ok) {
          throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        renderPage(data.sessions);

      } catch (err) {
        showError("Couldn't load your sessions. Is the backend running?");
        renderPage([]);   // show empty state gracefully
      }
    }

    // ── RENDER ────────────────────────────────────────────
    function renderPage(sessions) {
      // Hide skeleton
      document.getElementById("graphSkeleton").style.display = "none";

      // Session count badge
      document.getElementById("sessionCount").textContent =
        `${sessions.length} session${sessions.length !== 1 ? "s" : ""}`;

      // ── GRAPH ──
      const ctx = document.getElementById("progressChart");
      if (sessions.length === 0) {
        document.getElementById("emptyGraph").style.display = "block";
      } else {
        ctx.style.display = "block";
        new Chart(ctx, {
          type: "line",
          data: {
            labels: sessions.map((_, i) => `S${i + 1}`),
            datasets: [{
              data: sessions.map(s => s.avgScore),
              borderColor: "#e63946",
              pointBackgroundColor: "#e63946",
              pointRadius: 5,
              pointHoverRadius: 7,
              tension: 0.4,
              fill: false,
              borderWidth: 2
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: "#444", font: { size: 11 } }, grid: { color: "#161616" } },
              y: { min: 0, max: 10, ticks: { color: "#444", stepSize: 2, font: { size: 11 } }, grid: { color: "#161616" } }
            }
          }
        });
      }

      // ── STREAK ──
      const attendedDates = sessions.map(s => s.date);
      const uniqueDays = [...new Set(attendedDates)].length;
      document.getElementById("streakBadge").textContent =
        `${uniqueDays} day${uniqueDays !== 1 ? "s" : ""}`;

      const today = new Date();
      const year  = today.getFullYear();
      const month = today.getMonth();
      const todayStr = today.toISOString().split("T")[0];

      const monthNames = ["January","February","March","April","May","June",
                          "July","August","September","October","November","December"];
      document.getElementById("monthLabel").textContent = `${monthNames[month]} ${year}`;

      const daysInMonth   = new Date(year, month + 1, 0).getDate();
      const firstDayOfWeek = new Date(year, month, 1).getDay();
      const grid = document.getElementById("streakGrid");

      // Padding before first day
      for (let i = 0; i < firstDayOfWeek; i++) {
        grid.appendChild(document.createElement("div"));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const box = document.createElement("div");
        box.className = "streak-box " + (attendedDates.includes(dateStr) ? "attended" : "missed");
        if (dateStr === todayStr) box.classList.add("today");
        box.setAttribute("data-date", dateStr);
        grid.appendChild(box);
      }
    }

    // ── ERROR BANNER ──────────────────────────────────────
    function showError(msg) {
      const banner = document.getElementById("errorBanner");
      banner.textContent = msg;
      banner.style.display = "block";
    }

    // ── KICK OFF ──────────────────────────────────────────
    loadSessions();
  </script>
</body>
</html>
