<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uSpeak – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e63946;
      --text: #ffffff;
      --muted: #555555;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Red glow */
    .glow {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(230,57,70,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.1s forwards;
    }
    .logo .u { color: var(--accent); }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.15s forwards;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.2s forwards;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
      opacity: 0;
      animation: riseIn 0.5s ease 0.25s forwards;
    }

    .btn-google:hover { border-color: #333; background: #161616; }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      opacity: 0;
      animation: riseIn 0.5s ease 0.3s forwards;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Tab switcher */
    .tab-row {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: riseIn 0.5s ease 0.35s forwards;
    }

    .tab-btn {
      flex: 1;
      padding: 0.5rem;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab-btn.active {
      background: #1a1a1a;
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Form */
    .auth-form {
      display: none;
      opacity: 0;
      animation: riseIn 0.3s ease forwards;
    }

    .auth-form.active { display: block; }

    .field-group { margin-bottom: 1rem; }

    .field-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 0.5rem;
      display: block;
    }

    .field-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-input:focus { border-color: #333; }
    .field-input::placeholder { color: #2a2a2a; }

    /* Submit button */
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Error / success message */
    .msg {
      font-size: 0.8rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-top: 1rem;
      display: none;
    }

    .msg.error {
      background: rgba(230,57,70,0.08);
      border: 1px solid rgba(230,57,70,0.2);
      color: #e63946;
      display: block;
    }

    .msg.success {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      color: #22c55e;
      display: block;
    }

    /* Spinner inside button */
    .btn-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-spinner.visible { display: block; }

    /* Footer */
    .footer-note {
      text-align: center;
      font-size: 0.75rem;
      color: #2a2a2a;
      margin-top: 2rem;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="page-wrap">

    <!-- LOGO -->
    <div class="logo"><span class="u">U</span><span style="color:#fff">SPEAK</span></div>

    <!-- TITLE -->
    <h1 class="page-title">Welcome back.</h1>
    <p class="page-subtitle" id="pageSubtitle">Sign in to continue your practice</p>

    <!-- GOOGLE BUTTON -->
    <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <!-- TAB SWITCHER -->
    <div class="tab-row">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="loginForm">
      <div class="field-group">
        <label class="field-label">Email</label>
        <input id="loginEmail" type="email" placeholder="you@gmail.com" class="field-input" />
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input id="loginPassword" type="password" placeholder="••••••••" class="field-input" />
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        <span>Sign In</span>
        <div class="btn-spinner" id="loginSpinner"></div>
      </button>
      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="auth-form" id="registerForm">
      <div class="field-group">
        <label class="field-label">Full Name</label>
        <input id="regName" type="text" placeholder="Your name" class="field-input" />
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input id="regEmail" type="email" placeholder="you@gmail.com" class="field-input" />
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <input id="regPassword" type="password" placeholder="Min. 6 characters" class="field-input" />
      </div>
      <button class="btn-primary" id="registerBtn" onclick="handleRegister()">
        <span>Create Account</span>
        <div class="btn-spinner" id="registerSpinner"></div>
      </button>
      <div class="msg" id="registerMsg"></div>
    </div>

    <p class="footer-note">By continuing, you agree to practice speaking every day.</p>

  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    // ── If already logged in, skip to vibe ──
    const existingToken = localStorage.getItem("token");
    if (existingToken) window.location.href = "./vibe.html";

    // ── TAB SWITCHER ──────────────────────────────────────
    function switchTab(tab) {
      document.getElementById("loginForm").classList.remove("active");
      document.getElementById("registerForm").classList.remove("active");
      document.getElementById("loginTab").classList.remove("active");
      document.getElementById("registerTab").classList.remove("active");

      document.getElementById(`${tab}Form`).classList.add("active");
      document.getElementById(`${tab}Tab`).classList.add("active");

      const subtitle = document.getElementById("pageSubtitle");
      subtitle.textContent = tab === "login"
        ? "Sign in to continue your practice"
        : "Create your account to get started";
    }

    // ── EMAIL LOGIN ───────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const btn      = document.getElementById("loginBtn");
      const spinner  = document.getElementById("loginSpinner");
      const msg      = document.getElementById("loginMsg");

      if (!email || !password) {
        showMsg("loginMsg", "Please fill in all fields", "error");
        return;
      }

      btn.disabled = true;
      spinner.classList.add("visible");
      msg.className = "msg";

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg("loginMsg", data.detail || "Login failed", "error");
          return;
        }

        saveUserAndRedirect(data);

      } catch (err) {
        showMsg("loginMsg", "Server unreachable. Is the backend running?", "error");
      } finally {
        btn.disabled = false;
        spinner.classList.remove("visible");
      }
    }

    // ── EMAIL REGISTER ────────────────────────────────────
    async function handleRegister() {
      const name     = document.getElementById("regName").value.trim();
      const email    = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;
      const btn      = document.getElementById("registerBtn");
      const spinner  = document.getElementById("registerSpinner");

      if (!name || !email || !password) {
        showMsg("registerMsg", "Please fill in all fields", "error");
        return;
      }

      if (password.length < 6) {
        showMsg("registerMsg", "Password must be at least 6 characters", "error");
        return;
      }

      btn.disabled = true;
      spinner.classList.add("visible");

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showMsg("registerMsg", data.detail || "Registration failed", "error");
          return;
        }

        showMsg("registerMsg", "Account created! Redirecting...", "success");
        setTimeout(() => saveUserAndRedirect(data), 800);

      } catch (err) {
        showMsg("registerMsg", "Server unreachable. Is the backend running?", "error");
      } finally {
        btn.disabled = false;
        spinner.classList.remove("visible");
      }
    }

    // ── GOOGLE OAUTH ──────────────────────────────────────
    function signInWithGoogle() {
      const clientId    = "628696501999-6m3galqborucq1iqru64kqvlitba978e.apps.googleusercontent.com"; // ← replace with your actual client ID
      // In login.html
const redirectUri = encodeURIComponent("http://127.0.0.1:5500/pages/auth-callback.html");
      const scope       = encodeURIComponent("openid email profile");
      const state       = Math.random().toString(36).substring(2);

      localStorage.setItem("oauth_state", state);

      const url = `https://accounts.google.com/o/oauth2/v2/auth` +
        `?client_id=${clientId}` +
        `&redirect_uri=${redirectUri}` +
        `&response_type=code` +
        `&scope=${scope}` +
        `&state=${state}` +
        `&access_type=offline`;

      window.location.href = url;
    }

    // ── HELPERS ───────────────────────────────────────────
    function saveUserAndRedirect(data) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "./vibe.html";
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const loginActive = document.getElementById("loginForm").classList.contains("active");
      if (loginActive) handleLogin();
      else handleRegister();
    });
  </script>
</body>
</html>
